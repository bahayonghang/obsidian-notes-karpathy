<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50C878;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#grad1)" rx="20"/>
  
  <!-- Knowledge base nodes -->
  <circle cx="100" cy="100" r="30" fill="white" opacity="0.9"/>
  <circle cx="200" cy="80" r="25" fill="white" opacity="0.9"/>
  <circle cx="300" cy="120" r="35" fill="white" opacity="0.9"/>
  <circle cx="150" cy="200" r="28" fill="white" opacity="0.9"/>
  <circle cx="280" cy="220" r="32" fill="white" opacity="0.9"/>
  
  <!-- Connections -->
  <line x1="100" y1="100" x2="200" y2="80" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="200" y1="80" x2="300" y2="120" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="100" y1="100" x2="150" y2="200" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="300" y1="120" x2="280" y2="220" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="150" y1="200" x2="280" y2="220" stroke="white" stroke-width="3" opacity="0.6"/>
  
  <!-- Text -->
  <text x="200" y="160" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Knowledge</text>
  <text x="200" y="190" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.9">Graph</text>
</svg>
